add_newline = true

# ----------------------------------------------------
# format
# ----------------------------------------------------
format = """
$directory\
$git_branch\
$git_status\
$direnv\
$nodejs\
$fill\
$cmd_duration\
$time\
\n$character\
"""

# Enable if it appears on the same line as the command
# right_format = """
# $cmd_duration\
# $time\
# """

# ----------------------------------------------------
# left module
# ----------------------------------------------------
[nodejs]
format = """
[î‚؛](fg:#ffcb6b)\
[$virtualenv]($style)\
[î‚¼](fg:#ffcb6b)\
"""
style = "bold fg:#313244 bg:#ffcb6b"

[fill]
symbol = 'â”€'

[directory]
truncation_length = 6
truncation_symbol = 'ïپ¼ '
truncate_to_repo = false
home_symbol = '~'
read_only = ' َ°Œ¾ '
format = """
[î‚¶](fg:#A6E1FF)\
[$path]($style)\
[$read_only]($read_only_style)\
[î‚¼](fg:#A6E1FF)\
"""
style = 'bold fg:#313244 bg:#A6E1FF'
read_only_style = 'bold fg:#313244 bg:#A6E1FF'

[direnv]
disabled = false
format = """
[î‚؛](fg:#89dceb)\
[$symbol$allowed]($style)\
[î‚¼](fg:#89dceb)\
"""
style = "bold fg:#313244 bg:#89dceb"

[git_branch]
symbol = "ïگک"
style = "fg:#769ff0 bg:#112842"
format = """
[î‚؛](fg:#112842)\
[$symbol $branch]($style)\
"""

[git_status]
style = "fg:#769ff0 bg:#112842"
format = """
[$all_status$ahead_behind]($style)\
[î‚¼](fg:#112842)\
"""

# ----------------------------------------------------
# right module
# ----------------------------------------------------
[cmd_duration]
min_time = 1
style = 'fg:#e0af68'
format = "[ $duration]($style)" # nf-pl-right_soft_divider, nf-mdi-clock

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
format = '[[ ï€— $time](fg:#8FCBFF)]($style)'
